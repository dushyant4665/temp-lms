services:
  postgres:
    image: postgres:17-alpine
    container_name: tattvera-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tattvera
    ports:
      - "5432:5432"
    volumes:
      - tattvera_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tattvera"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  tattvera_postgres_data:
